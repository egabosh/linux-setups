---
- name: basic OpenWRT config
  hosts: all
  gather_facts: no

  vars:
    uci_vars:
      - { key: "wireless.{{ wlandev }}.disabled", value: "0" }
      - { key: "wireless.{{ wlandev }}.country", value: "{{ wlan_contry }}" }
      # default WLAN
      - { key: "wireless.default_{{ wlandev }}.ssid", value: "{{ wlan_ssid }}" }
      - { key: "wireless.default_{{ wlandev }}.encryption", value: "sae" }
      - { key: "wireless.default_{{ wlandev }}.key", value: "{{ wlan_key }}" }
      - { key: "wireless.default_{{ wlandev }}.mode", value: "ap" }
      - { key: "wireless.default_{{ wlandev }}.network", value: "lan" }

  tasks:
    - name: set uci values if needed
      raw: |
        current=$(uci get {{ item.key }} 2>/dev/null || echo "NOT_SET")
        desired="{{ item.value }}"
        if [ "$current" != "$desired" ]
        then
          uci set {{ item.key }}="{{ item.value }}"
          echo "changed"
        else
          echo "unchanged"
        fi
      loop: "{{ uci_vars }}"
      register: uci_set_result
      changed_when: "not 'unchanged' in uci_set_result.stdout"

    - name: apply changes
      block:
        - name: commit enable and restart
          raw: "{{ item }}"
          loop:
            - "uci commit"
            - "wifi reload"
          when: uci_set_result.changed
