---
- name: dhcp hosts
  hosts: all
  gather_facts: no
 
  vars:
    network: "{{ 'tor' if ip.startswith('192.168.142.') else ('iot' if ip.startswith('192.168.143.') else 'lan') }}"
    uci_vars:
      - { key: "dhcp.host_{{ host }}",  value: "host" }
      - { key: "dhcp.host_{{ host }}.name",  value: "{{ host }}" }
      - { key: "dhcp.host_{{ host }}.dns",   value: "1" }
      - { key: "dhcp.host_{{ host }}.ip",    value: "{{ ip }}" }
      - { key: "dhcp.host_{{ host }}.mac",   value: "{{ mac }}" }
      - { key: "dhcp.host_{{ host }}.tag",   value: "ansible,{{ network }}" }
      - { key: "dhcp.host_{{ host }}.hostid",  value: "{{ '%04d' | format(ip.split('.')[-1] | int) }}" }
      - { key: "dhcp.host_{{ host }}.instance", value: "{{ network }}_dnsmasq" }
      - { key: "dhcp.host_{{ host }}.leasetime", value: "1h" }

  tasks:

    - name: set uci values if needed
      raw: |
        desired=$(echo "{{ item.value }}")
        echo "{{ item.key }}" | grep name && desired=$(echo "{{ item.value }}" | sed 's/_/-/g')
        #desired=$(echo "{{ item.value }}" | sed 's/_/-/g')
        key=$(echo "{{ item.key }}" | sed 's/-/_/g')
        current=$(uci get $key 2>/dev/null || echo "NOT_SET")
        
        if ! echo "$current" | grep "$desired"
        then
          uci set $key="$desired"
          echo "changed"
        else
          echo "unchanged"
        fi
      loop: "{{ uci_vars }}"
      register: uci_set_result
      changed_when: "not 'unchanged' in uci_set_result.stdout"

    - name: apply changes
      block:
        - name: commit enable and restart
          raw: "{{ item }}"
          loop:
            - "uci commit dhcp"
            - "/etc/init.d/dnsmasq reload"
          when: uci_set_result.changed

