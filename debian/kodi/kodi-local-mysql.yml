---
- name: local maysql db for kodi
  hosts: all
  tasks:

    - name: Create /home/docker/kodidb.{{inventory_hostname}} dir
      ansible.builtin.file:
        path: /home/docker/kodidb.{{inventory_hostname}}
        owner: root
        group: docker
        state: directory
        mode: '0550'

    - name: /usr/local/sbin/autoupdate.d/kodidb-local.update
      blockinfile:
        path: /usr/local/sbin/autoupdate.d/kodidb-local.update
        create: yes
        mode: 0550
        owner: root
        group: root
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          cd /home/docker/kodidb.{{inventory_hostname}}

          # start phpmyadmin (if not) to force traefik to get a letsencrypt certificate
          docker compose up -d
          sleep 30

          if ! [ -s advancedsettings.xml ]
          then 
            db_user=kodidb
            echo "db_user_pw=$(pwgen -s 32 1)" >env.kodidb
            . ./env.kodidb
            db_host=192.168.41.1
            . /home/docker/_defaults/mariadb/envroot.db
            
            echo "grant all privileges on *.* TO '${db_user}'@'%' identified by '${db_user_pw}';" \
             | mariadb -u root -h $db_host  -P 3306 -p${MARIADB_ROOT_PASSWORD}
            echo "flush privileges;" \
             | mariadb -u root -h $db_host  -P 3306 -p${MARIADB_ROOT_PASSWORD}
            echo "ALTER USER '${db_user}'@'%' REQUIRE SSL;" \
             | mariadb -u root -h $db_host  -P 3306 -p${MARIADB_ROOT_PASSWORD}
            
            echo 'show databases;' | mariadb -u $db_user -h $db_host  -P 3306 -p${db_user_pw}

            echo "<advancedsettings>
            <videodatabase>
              <type>mysql</type>
              <host>${db_host}</host>
              <port>3306</port>
              <user>kodidb</user>
              <pass>${db_user_pw}</pass>
              <name>myKodiVideo</name>
            </videodatabase> 
            <musicdatabase>
              <type>mysql</type>
              <host>${db_host}</host>
              <port>3306</port>
              <user>kodidb</user>
              <pass>${db_user_pw}</pass>
              <name>myKodiMusic</name>
            </musicdatabase>
            <videolibrary>
              <importwatchedstate>true</importwatchedstate>
              <importresumepoint>true</importresumepoint>
            </videolibrary>
          </advancedsettings>" >advancedsettings.xml
            if ! [ -s /home/user/.kodi/userdata/advancedsettings.xml ]
            then
              mkdir -p /home/user/.kodi/userdata
              cp -p advancedsettings.xml /home/user/.kodi/userdata/advancedsettings.xml
              chown -R user:user /home/user/.kodi
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s

    - name: /usr/local/sbin/autoupdate.d/kodidb-local.update shebang
      lineinfile:
        path: /usr/local/sbin/autoupdate.d/kodidb-local.update
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: /home/docker/kodidb.{{inventory_hostname}}/docker-compose.yml Container Configuration
      blockinfile:
        path: /home/docker/kodidb.{{inventory_hostname}}/docker-compose.yml
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          services:
            kodidb.{{inventory_hostname}}:
              image: mariadb:lts
              cap_add:
                - SYS_NICE
              restart: unless-stopped
              networks:
                - kodidb.{{inventory_hostname}}--network
              volumes:
                - ./db-data:/var/lib/mysql
                - /etc/localtime:/etc/localtime:ro
              env_file:
                - /home/docker/_defaults/mariadb/envroot.db
                - /home/docker/_defaults/mariadb/mariadb.env
              ports:
                - 3306:3306

          networks:
            kodidb.{{inventory_hostname}}--network:
              driver: bridge
              driver_opts:
                com.docker.network.bridge.name: br-kodidb
            traefik:
              external: true

        backup: yes        
      notify: Restart mariadb

    - name: 
      ansible.builtin.shell: /usr/local/sbin/autoupdate.d/kodidb-local.update
      args:
        chdir: /home/docker/kodidb.{{inventory_hostname}}
        creates: /home/docker/kodidb.{{inventory_hostname}}/advancedsettings.xml

    - name: /usr/local/sbin/backup.d/kodidb-docker.backup
      blockinfile:
        path: /usr/local/sbin/backup.d/kodidb-docker.backup
        create: yes
        mode: 0550 
        owner: root
        group: root 
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          . /home/docker/_defaults/mariadb/envroot.db

          DAYS=7
          TIMESTAMP=$(date +"%Y%m%d%H%M")

          for i in $(echo "show databases" | mariadb -u root -h 192.168.41.1  -P 3306 -p${MARIADB_ROOT_PASSWORD} | egrep -v "^Database$|^performance_schema$|^information_schema$")
          do
            if mariadb-dump  -u root -h 192.168.41.1 -P 3306 -p${MARIADB_ROOT_PASSWORD} $i 2>${g_tmp}/dberr >$BACKUPDIR/KODIDB-$i-$TIMESTAMP.sql
            then
              gzip $BACKUPDIR/KODIDB-$i-$TIMESTAMP.sql
            else
              g_echo_error "MariaDB Backup failed $(cat ${g_tmp}/dberr)"
            fi
            # dont delete last old backups!
            OLD_BACKUPS=$(ls -1 $BACKUPDIR/KODIDB-$i*.gz 2>/dev/null | wc -l)
            [ -n "$OLD_BACKUPS" ] && if [ $OLD_BACKUPS -gt $DAYS ]
            then
              find $BACKUPDIR -name "KODIDB-$i*.gz" -daystart -mtime +$DAYS -delete
            fi
          done
          unset MARIADB_ROOT_PASSWORD
        backup: yes
        validate: /bin/bash -n %s

  handlers:

    - name: Restart mariadb
      ansible.builtin.shell: docker-compose up -d --force-recreate
      args:
        chdir: /home/docker/kodidb.{{inventory_hostname}}

