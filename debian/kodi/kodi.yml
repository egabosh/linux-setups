---
- name: Kodi Setup
  hosts: all
  tasks:

    - name: Install Basic Packages
      apt:
        name:
          # share desk
          - x11vnc
          # tools for android-smartphones/LineageOS
          - heimdall-flash
          - adb
          - fastboot
          - mkbootimg
          # desktop specific
          - cinnamon-desktop-environment
          - cinnamon-l10n
          - gnome-terminal
          - dconf-cli
          - dphys-swapfile
          - tsdecrypt
          - x264
          - x265
          - flatpak
          - ttf-mscorefonts-installer
          - fonts-terminus
          - mint-y-icons
          # useful other stuff
          - pwgen
          - arj
          - p7zip
          - unace
          - unadf
          - bvi
          - fdupes
          - debootstrap
          - geoip-bin
          - sshfs
          - speedtest-cli
          - gnome-characters
          - blueman
          # dconf-gui
          - dconf-editor
          # Media
          - vlc
          - gthumb
          - mediainfo-gui
          - easytag
          - audacity
          - asunder
          - mediathekview
          - audacious
          - guvcview
          - easyeffects
          - calf-plugins
          # retro
          - dosbox
          # brennen
          - brasero
          # misc
          - gpodder
          - wireguard
          - wireguard-tools
          - tinyproxy
          - hardinfo
          - rpi-imager
          - redshift-gtk
        update_cache: yes
        install_recommends: no

    - name: Install kodi for trixie
      apt:
        name:
          - kodi
          - kodi-pvr-iptvsimple
          - kodi-vfs-sftp
          - kodi-game-libretro
          - kodi-peripheral-joystick
          - lirc
          - ir-keytable
      when: ansible_distribution_release == "trixie"

    - name: Remove kodi21 for trixie
      apt:
        name:
          - kodi21
          - kodi21-pvr-iptvsimple
          - kodi21-vfs-sftp
          - kodi21-game-libretro
          - kodi21-peripheral-joystick
        state: absent
      when: ansible_distribution_release == "trixie"

    - name: Install kodi for bookworm
      apt:
        name:
          - kodi21
          - kodi21-pvr-iptvsimple
          - kodi21-vfs-sftp
          - kodi21-game-libretro
          - kodi21-peripheral-joystick
      when: ansible_distribution_release == "bookworm"

    - name: 1 GB swap (100MB default)
      ansible.builtin.lineinfile:
        path: /etc/dphys-swapfile
        regexp: '^CONF_SWAPSIZE=.+$'
        line: 'CONF_SWAPSIZE=1024'
        backup: yes

    - name: Replace /boot/firmware/config.txt with optimal Kodi KMS configuration
      copy:
        dest: /boot/firmware/config.txt
        content: |
          # /boot/firmware/config.txt - Optimal Kodi KMS Configuration
          
          # ARM Configuration
          arm_64bit=1
          arm_boost=1
          
          # Display Configuration
          disable_overscan=1
          
          # KMS with sufficient GPU memory for HEVC
          dtoverlay=vc4-kms-v3d,cma-256
          max_framebuffers=2
          
          # Fixed 720p@60Hz (comment out if display issues occur)
          hdmi_group=1
          hdmi_mode=16
          hdmi_force_hotplug=1
          
          # Audio
          dtparam=audio=on
          
          # Kodi Optimizations (reduces latency)
          gpu_mem=256
          disable_fw_kms_setup=1

    - name: lightdm config dir
      file:
        path: /etc/lightdm
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: lightdm config
      copy:
        dest: /etc/lightdm/lightdm.conf
        content: |
          [Seat:*]
          autologin-user=user
          autologin-user-timeout=0
          user-session=cinnamon
          greeter-session=lightdm-gtk-greeter
          greeter-hide-users=false
          greeter-show-manual-login=true
          allow-guest=false
        backup: yes

    - name: Disable lightdm
      ansible.builtin.systemd:
        name: lightdm.service
        enabled: false

    # 2. Kodi Standalone Service
    - name: Kodi Standalone Service
      copy:
        dest: /etc/systemd/system/kodi-standalone.service
        content: |
          [Unit]
          Description=Kodi Media Center Standalone
          After=graphical.target network-online.target
          Wants=network-online.target
          Conflicts=lightdm.service
          
          [Service]
          User=user
          Group=user
          Type=simple
          ExecStart=/usr/bin/kodi --standalone -fs
          Restart=no
          
          [Install]
          WantedBy=multi-user.target

    - name: Disable kodi
      ansible.builtin.systemd:
        name: kodi-standalone.service
        enabled: false

    - name: Allow port 8080 for remote control
      community.general.ufw:
        rule: allow
        port: '8080'
        proto: tcp

    - name: Install switch-kodi-desk.sh
      copy:
        dest: /usr/local/sbin/switch-kodi-desk.sh
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/bin/bash
          deskorkodi="kodi"
          while true
          do
            ps axu | grep ^user >/tmp/deskorkodi-$$
            if grep "/usr/bin/kodi " /tmp/deskorkodi-$$
            then
              deskorkodi="desk"
              # Kodi shutdown hang detection
              egrep -iq "info <general>: Stopping the application..." /home/user/.kodi/temp/kodi.log && grep -q "info <general>: Stopping all" /home/user/.kodi/temp/kodi.log && killall -9 kodi kodi.bin
              # Restart kodi/lightdm if remote database connection fails
              egrep -iq " Unable to open database: .*t connect to server" /home/user/.kodi/temp/kodi.log && systemctl restart kodi-standalone.service
            elif grep "cinnamon" /tmp/deskorkodi-$$
            then
              deskorkodi="kodi"
            else
              if [[ $deskorkodi = kodi ]]
              then
                systemctl stop lightdm
                systemctl start kodi-standalone
                deskorkodi="desk"
              elif [[ $deskorkodi = desk ]]
              then
                systemctl stop kodi-standalone
                systemctl start lightdm
                deskorkodi="kodi"
                sleep 10
              else
                systemctl stop lightdm
                systemctl start kodi-standalone
                deskorkodi="desk"
              fi
            fi
            echo VAR=$deskorkodi
            sleep 10
          done

    - name: Install switch-kodi-desk systemd service
      copy:
        dest: /etc/systemd/system/switch-kodi-desk.service
        mode: '0644'
        owner: root
        group: root
        content: |
          [Unit]
          Description=Switch between Kodi and Desktop
          After=network.target
          Wants=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/sbin/switch-kodi-desk.sh
          Restart=always
          RestartSec=5
          User=root
          Group=root

          [Install]
          WantedBy=multi-user.target

    - name: daemon-reload
      systemd:
        daemon_reload: yes

