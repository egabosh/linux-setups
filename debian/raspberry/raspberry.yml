    - name: Prepare new cmdline with required parameters (Raspberry Pi)
      set_fact:
        new_cmdline: >-
          {{
            (
              (lookup('file', '/boot/firmware/cmdline.txt') | trim).split()
              | difference(['cgroup_enable=memory','cgroup_memory=1','cgroup_enable=cpuset','swapaccount=1'])
              + ['cgroup_enable=memory','cgroup_memory=1','cgroup_enable=cpuset','swapaccount=1']
            ) | join(' ')
          }}

    # Write back only if changed (Raspberry Pi)
    - name: Update /boot/firmware/cmdline.txt if necessary (Raspberry Pi)
      copy:
        dest: /boot/firmware/cmdline.txt
        content: "{{ new_cmdline }}\n"
        owner: root
        group: root
        mode: '0644'
      changed_when: false

    - name: Replace /boot/firmware/config.txt with optimized config
      copy:
        dest: /boot/firmware/config.txt
        content: |
          # /boot/firmware/config.txt - Optimal Kodi KMS Configuration

          # ARM Configuration
          arm_64bit=1
          arm_boost=1

          # Display Configuration
          disable_overscan=1

          # KMS with sufficient GPU memory for HEVC
          dtoverlay=vc4-kms-v3d,cma-256
          max_framebuffers=2
              
          # Fixed 720p@60Hz (comment out if display issues occur)
          hdmi_group=1
          hdmi_mode=16
          hdmi_force_hotplug=1
          
          # Audio
          dtparam=audio=on
              
          # Kodi Optimizations (reduces latency)
          gpu_mem=256
          disable_fw_kms_setup=1


