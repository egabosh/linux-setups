---
- name: TTS OpenAI Proxy – Piper Ramona (CPU)
  hosts: all
  become: yes
  vars:
    tts_home: /opt/tts
    tts_venv: "{{ tts_home }}/venv"
    tts_port: 8083
    ansible_remote_tmp: /opt/tmp/ansible_$$

  environment:
    TMPDIR: /opt/tmp 
    PIP_CACHE_DIR: /opt/.pip-cache

  tasks:
    - name: System packages
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - libsndfile1
        state: present

    - name: TTS directories
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
      loop:
        - "{{ tts_home }}"
        - "{{ tts_home }}/voices"

    - name: Virtual env
      command:
        cmd: "python3 -m venv {{ tts_venv }}"
        creates: "{{ tts_venv }}/bin/python"

    - name: Piper-TTS installieren
      pip:
        name:
          - piper-tts
          - scipy
        virtualenv: "{{ tts_venv }}"
        virtualenv_command: python3 -m venv
        state: latest
      notify: restart tts-proxy

    - name: Ramona voice (ONNX)
      get_url:
        url: "https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/ramona/low/de_DE-ramona-low.onnx?download=true"
        dest: "{{ tts_home }}/voices/de_DE-ramona-low.onnx"
        force: no
      notify: restart tts-proxy

    - name: Ramona voice (Config)
      get_url:
        url: "https://huggingface.co/rhasspy/piper-voices/resolve/main/de/de_DE/ramona/low/de_DE-ramona-low.onnx.json?download=true"
        dest: "{{ tts_home }}/voices/de_DE-ramona-low.onnx.json"
        force: no
      notify: restart tts-proxy

    - name: Proxy script
      copy:
        dest: "{{ tts_home }}/tts_openai_proxy.py"
        owner: root
        group: root
        mode: "0755"
        content: |
          import json, io, os, sys
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import numpy as np
          import scipy.io.wavfile as wavfile
          from piper import PiperVoice, SynthesisConfig

          PORT      = int(os.environ.get('TTS_PORT', '8083'))
          SPEED     = float(os.environ.get('TTS_SPEED', '1.0'))
          VOICE_DIR = os.environ.get('TTS_VOICE_DIR', '/opt/tts/voices')
          VOICE     = os.environ.get('TTS_VOICE', 'de_DE-ramona-low')

          VOICE_ALIASES = {
              "alloy":  "de_DE-ramona-low",
              "echo":   "de_DE-ramona-low",
              "fable":  "de_DE-ramona-low",
              "nova":   "de_DE-ramona-low",
              "onyx":   "de_DE-ramona-low",
              "shimmer":"de_DE-ramona-low",
          }

          voice_path = os.path.join(VOICE_DIR, VOICE + '.onnx')
          print(f'Loading Piper voice: {voice_path}')
          sys.stdout.flush()
          voice = PiperVoice.load(voice_path)
          syn_config = SynthesisConfig(length_scale=1.2)
          print(f'Pipeline ready on port {PORT}')
          sys.stdout.flush()

          class TTSHandler(BaseHTTPRequestHandler):
              def _synthesize(self, text, speed):
                  syn_config.length_scale = 1.0 / max(speed, 0.25)
                  audio_gen = voice.synthesize(text, syn_config)
                  chunks = list(audio_gen)
                  audio = np.concatenate([c.audio_float_array for c in chunks])
                  audio_int16 = (np.clip(audio, -1.0, 1.0) * 32767).astype(np.int16)
                  buf = io.BytesIO()
                  wavfile.write(buf, chunks[0].sample_rate, audio_int16)
                  return buf.getvalue()

              def do_GET(self):
                  if '/health' in self.path:
                      self._json(200, {'status': 'ok', 'voice': VOICE, 'device': 'cpu'})
                  elif '/v1/models' in self.path:
                      self._json(200, {'data': [{'id': 'tts-1', 'object': 'model'}]})
                  else:
                      self._json(404, {'error': 'not found'})

              def do_POST(self):
                  if '/v1/audio/speech' in self.path or self.path == '/':
                      self._handle_tts()
                  else:
                      self._json(404, {'error': 'not found'})

              def _json(self, code, obj):
                  self.send_response(code)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps(obj).encode())

              def _handle_tts(self):
                  try:
                      length = int(self.headers.get('Content-Length', 0))
                      body = json.loads(self.rfile.read(length))
                      text = body.get('input') or body.get('text', '')
                      if not text:
                          self._json(400, {'error': 'no input text'})
                          return
                      voice_key = body.get('voice', '').lower()
                      voice_key = VOICE_ALIASES.get(voice_key, VOICE)
                      speed = float(body.get('speed', SPEED))
                      data = self._synthesize(text, speed)
                      self.send_response(200)
                      self.send_header('Content-Type', 'audio/wav')
                      self.send_header('Content-Length', str(len(data)))
                      self.end_headers()
                      self.wfile.write(data)
                  except Exception as e:
                      import traceback
                      traceback.print_exc()
                      self._json(500, {'error': str(e)})

          if __name__ == '__main__':
              HTTPServer(('0.0.0.0', PORT), TTSHandler).serve_forever()
      notify: restart tts-proxy

    - name: systemd service
      copy:
        dest: /etc/systemd/system/tts-proxy.service
        content: |
          [Unit]
          Description=TTS OpenAI Proxy (Piper Ramona, Deutsch)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart={{ tts_venv }}/bin/python {{ tts_home }}/tts_openai_proxy.py
          Environment="TTS_PORT={{ tts_port }}"
          Environment="TTS_VOICE=de_DE-ramona-low"
          Environment="TTS_SPEED=1.0"
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
      notify: restart tts-proxy


    - name: Enable & start service
      systemd:
        name: tts-proxy
        enabled: yes
        state: started
        daemon_reload: yes

    - name: UFW allow TTS port
      ufw:
        rule: allow
        port: "{{ tts_port }}"
        proto: tcp

  handlers:
    - name: restart tts-proxy
      systemd:
        name: tts-proxy
        state: restarted
        daemon_reload: yes
