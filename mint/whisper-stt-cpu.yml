---
- name: Whisper TTS
  hosts: all

  vars:
    whisper_user: "llama"
    whisper_dir: "/opt/whisper.cpp"
    server_port: 8081
    proxy_port: 8082
    whisper_model: "ggml-large-v3-turbo.bin"
    whisper_model_url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/{{ whisper_model }}"
    whisper_lang: "de"
    ansible_remote_tmp: /opt/tmp/ansible_$$

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install build dependencies
      ansible.builtin.apt:
        name:
          - build-essential
          - cmake
          - git
          - curl
          - ufw
          - wget
        state: present

    - name: Clone/Update whisper.cpp repository
      ansible.builtin.git:
        repo: https://github.com/ggerganov/whisper.cpp.git
        dest: "{{ whisper_dir }}"
        version: master
        force: no
        update: yes
      notify: Rebuild whisper.cpp for CPU

    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ whisper_dir }}"
        - "{{ whisper_dir }}/models"

    - name: Check for existing Whisper model
      ansible.builtin.stat:
        path: "{{ whisper_dir }}/models/{{ whisper_model }}"
      register: whisper_model_stat

    - name: Download Whisper model (if not present)
      ansible.builtin.get_url:
        url: "{{ whisper_model_url }}"
        dest: "{{ whisper_dir }}/models/{{ whisper_model }}"
        mode: "0644"
        timeout: 3600
        force: no
      when: not whisper_model_stat.stat.exists

    - name: Deploy systemd service file
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=whisper.cpp CPU STT Server (Deutsch)
          After=network.target

          [Service]
          Type=simple
          User={{ whisper_user }}
          Group={{ whisper_user }}

          PrivateTmp=false
          ProtectSystem=full
          ProtectHome=read-only
          NoNewPrivileges=no

          ExecStart=/opt/whisper.cpp/build/bin/whisper-server \
            -m /opt/whisper.cpp/models/{{ whisper_model }} \
            -l {{ whisper_lang }} \
            -t {{ ansible_processor_vcpus // 2 }} \
            --port {{ server_port }} \
            --host 0.0.0.0 \
            

          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=whisper-server

          ReadWritePaths=/opt/whisper.cpp /tmp /var/tmp

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/whisper-server.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart whisper-server

    - name: Enable and start whisper-server service
      ansible.builtin.systemd:
        name: whisper-server
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Deploy OpenAI-compatible whisper proxy script
      ansible.builtin.copy:
        dest: /opt/whisper_openai_proxy.py
        owner: llama
        group: llama
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          """OpenAI-compatible proxy for whisper.cpp server.
          
          Translates:
            POST /v1/audio/transcriptions -> POST http://localhost:{{ server_port }}/inference
            Returns {"text": "..."} format.
          """
          import json
          import os
          import urllib.request
          import urllib.error
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from urllib.parse import urlparse
          
          WHISPER_BACKEND = os.environ.get("WHISPER_BACKEND_URL", "http://localhost:{{ server_port }}")
          BIND_HOST = os.environ.get("BIND_HOST", "0.0.0.0")
          BIND_PORT = int(os.environ.get("BIND_PORT", "{{ proxy_port }}"))
          
          
          class ProxyHandler(BaseHTTPRequestHandler):
          
              def do_OPTIONS(self):
                  self.send_response(200)
                  self._cors_headers()
                  self.end_headers()
          
              def do_POST(self):
                  path = urlparse(self.path).path.rstrip("/")
                  if path != "/v1/audio/transcriptions":
                      self._json(404, {"error": "Not found"})
                      return
          
                  content_length = int(self.headers.get("Content-Length", 0))
                  body = self.rfile.read(content_length)
                  content_type = self.headers.get("Content-Type", "")
          
                  # forward to whisper.cpp backend
                  req = urllib.request.Request(
                      f"{WHISPER_BACKEND}/inference",
                      data=body,
                      headers={
                          "Content-Type": content_type,
                          "Accept": "application/json",
                      },
                      method="POST",
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=300) as resp:
                          backend_data = json.loads(resp.read())
                  except urllib.error.HTTPError as e:
                      self._json(e.code, {"error": e.read().decode()})
                      return
                  except Exception as e:
                      self._json(500, {"error": str(e)})
                      return
          
                  # whisper.cpp returns {"text": "..."} already
                  text = backend_data.get("text", "")
                  self._json(200, {"text": text})
          
              def _json(self, status, data):
                  self.send_response(status)
                  self._cors_headers()
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(json.dumps(data).encode())
          
              def _cors_headers(self):
                  self.send_header("Access-Control-Allow-Origin", "*")
                  self.send_header("Access-Control-Allow-Methods", "POST, OPTIONS")
                  self.send_header("Access-Control-Allow-Headers", "Content-Type, Authorization")
          
              def log_message(self, fmt, *args):
                  print(f"[whisper-proxy] {self.client_address[0]} - {fmt % args}")
          
          
          if __name__ == "__main__":
              server = HTTPServer((BIND_HOST, BIND_PORT), ProxyHandler)
              print(f"whisper-openai-proxy listening on {BIND_HOST}:{BIND_PORT} -> {WHISPER_BACKEND}")
              try:
                  server.serve_forever()
              except KeyboardInterrupt:
                  server.shutdown()
      notify: Restart whisper-openai-proxy


    - name: Deploy whisper-openai-proxy systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/whisper-openai-proxy.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=OpenAI-compatible proxy for whisper.cpp STT
          After=network.target whisper-server.service
          BindsTo=whisper-server.service

          [Service]
          Type=simple
          User=llama
          Group=llama
          ExecStart=/usr/bin/python3 /opt/whisper_openai_proxy.py
          Restart=on-failure
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=whisper-openai-proxy

          [Install]
          WantedBy=multi-user.target
      notify: Restart whisper-openai-proxy

    - name: Enable and start whisper-openai-proxy service
      ansible.builtin.systemd:
        name: whisper-openai-proxy
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Allow whisper proxy port {{ proxy_port  }} in UFW
      community.general.ufw:
        rule: allow
        port: "{{ proxy_port  }}"
        proto: tcp
      notify: reload ufw

    #- name: Allow whisper proxy port {{ server_port  }} in UFW
    #  community.general.ufw:
    #    rule: allow
    #    port: "{{ server_port  }}"
    #    proto: tcp
    #  notify: reload ufw


  handlers: 

    - name: reload ufw
      ansible.builtin.command: ufw reload

    - name: Rebuild whisper.cpp for CPU
      ansible.builtin.shell: |
        rm -rf build/
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build -j$(nproc) --target whisper-server
      args:
        chdir: "{{ whisper_dir }}"
      register: build_result
      changed_when: build_result.rc == 0
      notify: Restart whisper-server

    - name: Restart whisper-server
      ansible.builtin.systemd:
        name: whisper-server
        state: restarted
        daemon_reload: yes

    - name: Restart whisper-openai-proxy
      ansible.builtin.systemd:
        name: whisper-openai-proxy
        state: restarted
        daemon_reload: yes


